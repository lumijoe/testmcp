<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案件ダッシュボード</title>
  <script src="data.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: #f1f5f9; height: 100vh; overflow: hidden; color: #1e293b;
    }
    .app { display: flex; height: 100vh; }

    /* ── Left Nav ── */
    .left-nav { width: 220px; background: #0f172a; display: flex; flex-direction: column; flex-shrink: 0; }
    .nav-logo { padding: 22px 20px 18px; border-bottom: 1px solid #1e293b; }
    .nav-logo h1 { color: #f8fafc; font-size: 15px; font-weight: 700; letter-spacing: .03em; }
    .nav-logo p  { color: #475569; font-size: 11px; margin-top: 3px; }
    .nav-section-label { padding: 18px 20px 6px; font-size: 10px; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: .1em; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 11px 20px;
      color: #94a3b8; cursor: pointer; transition: background .15s, color .15s;
      font-size: 13.5px; border-left: 3px solid transparent; user-select: none;
    }
    .nav-item:hover  { background: #1e293b; color: #cbd5e1; }
    .nav-item.active { background: #1e3a5f; color: #93c5fd; border-left-color: #3b82f6; }
    .nav-item .ni { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }

    /* ── SP: ナローナビ ── */
    @media (max-width: 768px) {
      .left-nav { width: 52px; }
      .nav-logo { padding: 14px 0; display: flex; justify-content: center; }
      .nav-logo h1, .nav-logo p, .nav-section-label { display: none; }
      .nav-item { padding: 12px 0; justify-content: center; }
      .nav-label { display: none; }
      .nav-item .ni { width: auto; font-size: 20px; }
      .nav-item.active { border-left-width: 3px; }
    }

    /* ── Middle Nav ── */
    .middle-nav {
      width: 0; overflow: hidden; background: #162032;
      border-right: 1px solid #1e293b; display: flex; flex-direction: column;
      flex-shrink: 0; transition: width .28s cubic-bezier(.4,0,.2,1);
    }
    .middle-nav.open { width: 196px; }
    .mid-header { padding: 18px 16px 10px; font-size: 10px; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: .1em; border-bottom: 1px solid #1e293b; flex-shrink: 0; white-space: nowrap; }
    .mid-items { overflow-y: auto; flex: 1; padding: 6px 0; }
    .mid-items::-webkit-scrollbar { width: 4px; }
    .mid-items::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    .manual-btn { display: flex; align-items: center; gap: 9px; padding: 9px 14px; color: #94a3b8; text-decoration: none; font-size: 12.5px; transition: background .15s, color .15s; white-space: nowrap; }
    .manual-btn:hover { background: #1e293b; color: #e2e8f0; }
    .manual-btn .mi { font-size: 13px; width: 18px; flex-shrink: 0; }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
    .topbar { background: white; border-bottom: 1px solid #e2e8f0; padding: 0 28px; height: 60px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .topbar h2 { font-size: 18px; font-weight: 700; color: #0f172a; }
    .topbar-meta { font-size: 12px; color: #94a3b8; }
    .content { flex: 1; overflow-y: auto; padding: 24px 28px; }
    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    /* ── Views ── */
    .view { display: none; }
    .view.active { display: block; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: white; border-radius: 12px; padding: 18px 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .stat-card .label { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .06em; }
    .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 6px; }
    .stat-card.total .value    { color: #0f172a; }
    .stat-card.active .value   { color: #16a34a; }
    .stat-card.upcoming .value { color: #2563eb; }
    .stat-card.ending .value   { color: #d97706; }

    /* Card / Table */
    .card { background: white; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06); overflow: hidden; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid #f1f5f9; }
    .card-header h3 { font-size: 14px; font-weight: 600; color: #0f172a; }
    table { width: 100%; border-collapse: collapse; }
    thead th { background: #f8fafc; padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid #e2e8f0; }
    tbody td { padding: 10px 16px; border-bottom: 1px solid #f8fafc; font-size: 13px; color: #334155; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #f8fafc; }
    .badge { display: inline-flex; align-items: center; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; white-space: nowrap; letter-spacing: .02em; }
    .badge-active   { background: #dcfce7; color: #15803d; }
    .badge-upcoming { background: #dbeafe; color: #1d4ed8; }
    .badge-ending   { background: #fef9c3; color: #a16207; }
    .case-title { font-size: 13px; font-weight: 600; color: #1e293b; }
    .case-period { font-size: 11px; color: #94a3b8; margin-top: 3px; }
    .banner-name { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 4px; background: #e2e8f0; color: #475569; font-size: 11px; font-weight: 700; }
    .group-top td { border-top: 2px solid #e2e8f0; }
    td.title-cell { vertical-align: top; padding-top: 14px; font-size: 13px; font-weight: 600; color: #1e293b; max-width: 160px; }
    .tbl-btn {
      display: inline-flex; align-items: center; padding: 4px 8px;
      border-radius: 5px; font-size: 12px; font-weight: 400;
      border: none; cursor: pointer; text-decoration: none;
      white-space: nowrap; transition: opacity .15s;
    }
    .tbl-btn:hover { opacity: .75; }
    .tbl-btn-save, .tbl-btn-submit, .tbl-btn-wp { background: #f1f5f9; color: #475569; }
    .tbl-btn-save:hover, .tbl-btn-submit:hover, .tbl-btn-wp:hover { background: #e2e8f0; }
    .tbl-btns { display: flex; gap: 4px; flex-wrap: wrap; }

    /* 案件情報 */
    .select-wrap { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06); margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
    .select-wrap label { font-size: 13px; font-weight: 600; color: #475569; white-space: nowrap; }
    .select-wrap select { flex: 1; max-width: 360px; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; color: #1e293b; background: #f8fafc; outline: none; cursor: pointer; }
    .select-wrap select:focus { border-color: #3b82f6; }
    .info-detail { background: white; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06); overflow: hidden; }
    .info-detail-header { background: #1e3a5f; padding: 20px 24px; color: white; }
    .info-detail-header h3 { font-size: 18px; font-weight: 700; }
    .info-detail-header p  { font-size: 12px; color: #93c5fd; margin-top: 4px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; }
    .info-row { padding: 14px 24px; border-bottom: 1px solid #f1f5f9; display: flex; flex-direction: column; gap: 4px; }
    .info-row:nth-child(odd) { border-right: 1px solid #f1f5f9; }
    .info-row.full { grid-column: 1 / -1; }
    .info-row .key { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .06em; }
    .info-row .val { font-size: 14px; color: #1e293b; font-weight: 500; }
    .info-row .val.copy { white-space: pre-line; line-height: 1.7; }

    /* チェックリスト */
    .cl-header { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06); margin-bottom: 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .cl-header label { font-size: 13px; font-weight: 600; color: #475569; white-space: nowrap; }
    .cl-header select { flex: 1; max-width: 360px; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; color: #1e293b; background: #f8fafc; outline: none; cursor: pointer; }
    .cl-header select:focus { border-color: #3b82f6; }
    .cl-progress { display: flex; align-items: center; gap: 10px; }
    .cl-progress-bar { width: 120px; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
    .cl-progress-fill { height: 100%; background: #3b82f6; border-radius: 3px; transition: width .3s; }
    .cl-progress-label { font-size: 12px; color: #64748b; white-space: nowrap; }
    .reset-btn { margin-left: auto; padding: 6px 12px; background: #f1f5f9; border: none; border-radius: 6px; font-size: 12px; color: #64748b; cursor: pointer; }
    .reset-btn:hover { background: #e2e8f0; }
    .checklist-group { margin-bottom: 20px; }
    .checklist-group h3 { font-size: 13px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
    .checklist-card { background: white; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06); overflow: hidden; }
    .check-item { display: flex; align-items: center; gap: 12px; padding: 13px 20px; border-bottom: 1px solid #f8fafc; cursor: pointer; transition: background .12s; }
    .check-item:last-child { border-bottom: none; }
    .check-item:hover { background: #f8fafc; }
    .check-item input[type=checkbox] { width: 16px; height: 16px; accent-color: #3b82f6; cursor: pointer; flex-shrink: 0; }
    .check-label { font-size: 13.5px; color: #334155; flex: 1; }
    .check-item input:checked ~ .check-label { color: #94a3b8; text-decoration: line-through; }

    /* 共通リンク */
    .links-welcome { background: white; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06); padding: 40px; text-align: center; }
    .links-welcome .icon { font-size: 48px; margin-bottom: 12px; }
    .links-welcome h3 { font-size: 18px; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
    .links-welcome p { font-size: 13px; color: #64748b; }
    .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; font-size: 14px; }
  </style>
</head>
<body>
<div class="app">

  <nav class="left-nav">
    <div class="nav-logo">
      <h1>案件管理</h1>
      <p>Dashboard</p>
    </div>
    <div class="nav-section-label">メニュー</div>
    <div class="nav-item active" data-view="cases"     onclick="navigate(this)"><span class="ni">📋</span><span class="nav-label">案件一覧</span></div>
    <div class="nav-item"        data-view="links"     onclick="navigate(this)"><span class="ni">🔗</span><span class="nav-label">共通リンク</span></div>
    <div class="nav-item"        data-view="info"      onclick="navigate(this)"><span class="ni">📁</span><span class="nav-label">案件情報</span></div>
    <div class="nav-item"        data-view="checklist" onclick="navigate(this)"><span class="ni">✅</span><span class="nav-label">制作チェックリスト</span></div>
  </nav>

  <div class="middle-nav" id="middleNav">
    <div class="mid-header">マニュアル</div>
    <div class="mid-items" id="midItems"></div>
  </div>

  <main class="main">
    <div class="topbar">
      <h2 id="pageTitle">案件一覧</h2>
      <span class="topbar-meta" id="topbarMeta"></span>
    </div>
    <div class="content">

      <!-- 案件一覧 -->
      <div class="view active" id="view-cases">
        <div class="stats">
          <div class="stat-card total">   <div class="label">総案件数</div> <div class="value" id="s-total">—</div></div>
          <div class="stat-card active">  <div class="label">掲載中</div>   <div class="value" id="s-active">—</div></div>
          <div class="stat-card upcoming"><div class="label">掲載予定</div> <div class="value" id="s-upcoming">—</div></div>
          <div class="stat-card ending">  <div class="label">終了間近</div> <div class="value" id="s-ending">—</div></div>
        </div>
        <div class="card">
          <div class="card-header"><h3>全案件リスト</h3></div>
          <table>
            <thead><tr>
              <th>案件タイトル</th>
              <th>ID</th>
              <th>区分</th>
              <th>掲載期間</th>
              <th>ファイル名</th>
              <th>リンク</th>
              <th>ステータス</th>
            </tr></thead>
            <tbody id="casesTableBody"></tbody>
          </table>
        </div>
      </div>

      <!-- 共通リンク -->
      <div class="view" id="view-links">
        <div class="links-welcome">
          <div class="icon">🔗</div>
          <h3>共通リンク・マニュアル</h3>
          <p>左のメニューからマニュアルを選択してください。</p>
        </div>
      </div>

      <!-- 案件情報 -->
      <div class="view" id="view-info">
        <div class="select-wrap">
          <label>案件を選択：</label>
          <select id="caseSelect" onchange="renderInfo()">
            <option value="">-- 案件を選んでください --</option>
          </select>
        </div>
        <div class="info-detail" id="infoDetail">
          <div class="empty-state">案件を選択すると詳細が表示されます</div>
        </div>
      </div>

      <!-- チェックリスト -->
      <div class="view" id="view-checklist">
        <div class="cl-header">
          <label>案件を選択：</label>
          <select id="clSelect" onchange="renderChecklist()">
            <option value="">-- 案件を選んでください --</option>
          </select>
          <div class="cl-progress" id="clProgress" style="display:none">
            <div class="cl-progress-bar"><div class="cl-progress-fill" id="clFill"></div></div>
            <span class="cl-progress-label" id="clLabel"></span>
          </div>
          <button class="reset-btn" id="resetBtn" style="display:none" onclick="resetChecklist()">リセット</button>
        </div>
        <div id="checklistWrap">
          <div class="empty-state">案件を選択するとチェックリストが表示されます</div>
        </div>
      </div>

    </div>
  </main>
</div>

<script>
// ── データ ───────────────────────────────────────────────────
const CASES = CASES_DATA; // 各要素: { groupId, title, submitUrl, slack, banners: [...] }
const TODAY = new Date();

const CHECKLIST_GROUPS = [
  { label: '素材・原稿確認', keys: ['使用画像ファイルの受領確認','画像の解像度・サイズ確認','キャッチコピー（大バナー）の確認','キャッチコピー（小バナー）の確認','誘導先URLの疎通確認'] },
  { label: '制作作業',       keys: ['大バナー制作','小バナー制作','バナーデザインの社内確認','クライアント確認・修正対応','最終バナーデータの書き出し'] },
  { label: '掲載設定',       keys: ['CMSへのバナー登録','掲載開始日・終了日の設定','誘導先URLのリンク設定','掲載確認（ステージング）','本番公開・表示確認'] },
  { label: '終了・非公開処理', keys: ['終了日5営業日前にSlack通知済み','クライアントへの終了前連絡','非公開設定の実施','バナー非表示の確認','素材・データのアーカイブ'] },
];

// ── XSS対策 ──────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function safeHref(url) {
  const t = String(url ?? '').trim();
  return /^(https?:\/\/|\/)/.test(t) ? esc(t) : '#';
}

// ── ステータス ────────────────────────────────────────────────
function parseDate(s) { const [y,m,d] = s.split('/').map(Number); return new Date(y,m-1,d); }
function getStatus(c) {
  const s = parseDate(c.start), e = parseDate(c.end);
  if (TODAY < s) return 'upcoming';
  if (TODAY > e) return 'ended';
  return (e - TODAY) / 86400000 <= 7 ? 'ending' : 'active';
}
function badgeHtml(st) {
  const m = { active:['badge-active','掲載中'], upcoming:['badge-upcoming','掲載予定'], ending:['badge-ending','終了間近'], ended:['','終了'] };
  const [cls, label] = m[st] || ['', st];
  return `<span class="badge ${cls}">${label}</span>`;
}

// ── localStorage チェックリスト ───────────────────────────────
function clKey(caseId) { return `cl_${caseId}`; }
function loadState(caseId) { return JSON.parse(localStorage.getItem(clKey(caseId)) || '{}'); }
function saveState(caseId, state) { localStorage.setItem(clKey(caseId), JSON.stringify(state)); }

// ── ステータス（バナー単位） ──────────────────────────────────
function getBannerStatus(banner) {
  const s = parseDate(banner.start), e = parseDate(banner.end);
  if (TODAY < s) return 'upcoming';
  if (TODAY > e) return 'ended';
  return (e - TODAY) / 86400000 <= 7 ? 'ending' : 'active';
}

// ── 案件一覧 ─────────────────────────────────────────────────
function renderCases() {
  const allBanners = CASES.flatMap(g => g.banners);
  const statuses   = allBanners.map(getBannerStatus);
  const cnt = s => statuses.filter(x => x === s).length;
  document.getElementById('s-total').textContent    = CASES.length;
  document.getElementById('s-active').textContent   = cnt('active') + cnt('ending');
  document.getElementById('s-upcoming').textContent = cnt('upcoming');
  document.getElementById('s-ending').textContent   = cnt('ending');
  document.getElementById('topbarMeta').textContent = `全 ${CASES.length} グループ`;

  document.getElementById('casesTableBody').innerHTML = CASES.map(group => {
    const count = group.banners.length;
    return group.banners.map((banner, idx) => {
      const isFirst = idx === 0;
      return `<tr class="${isFirst ? 'group-top' : ''}">
        ${isFirst ? `<td class="title-cell" rowspan="${count}">${esc(group.title)}</td>` : ''}
        <td><strong>${esc(banner.id)}</strong></td>
        <td>${banner.name ? `<span class="banner-name">${esc(banner.name)}</span>` : ''}</td>
        <td style="font-size:12px;white-space:nowrap">${esc(banner.start)}<br><span style="color:#94a3b8">〜 ${esc(banner.end)}</span></td>
        <td style="font-size:12px;color:#64748b">${esc(banner.images)}</td>
        <td>
          <div class="tbl-btns">
            <button class="tbl-btn tbl-btn-save"   onclick="">保存先</button>
            ${isFirst ? `<button class="tbl-btn tbl-btn-submit" onclick="">提出先</button>` : ''}
            ${banner.wpUrl ? `<button class="tbl-btn tbl-btn-wp" onclick="">WordPress</button>` : ''}
            ${group.slack ? `<a class="tbl-btn" href="${safeHref(group.slack)}" target="_blank" rel="noopener">Slack <span style="font-size:10px">↗</span></a>` : ''}
          </div>
        </td>
        <td>${badgeHtml(getBannerStatus(banner))}</td>
      </tr>`;
    }).join('');
  }).join('');
}

// ── セレクト共通 ──────────────────────────────────────────────
function populateSelect(id) {
  const sel = document.getElementById(id);
  const prev = sel.value;
  sel.innerHTML = '<option value="">-- 案件を選んでください --</option>';
  CASES.forEach(g => {
    const o = document.createElement('option');
    o.value = g.groupId; o.textContent = g.title;
    sel.appendChild(o);
  });
  sel.value = prev;
}

// ── 案件情報 ─────────────────────────────────────────────────
function renderInfo() {
  const gid = document.getElementById('caseSelect').value;
  const box = document.getElementById('infoDetail');
  if (!gid) { box.innerHTML = '<div class="empty-state">案件を選択すると詳細が表示されます</div>'; return; }
  const group = CASES.find(x => x.groupId === gid);
  if (!group) return;
  box.innerHTML = `
    <div class="info-detail-header">
      <h3>${esc(group.title)}</h3>
      <p>${group.banners.length}バナー構成</p>
    </div>
    ${group.banners.map(b => `
    <div style="padding:16px 24px;border-bottom:1px solid #f1f5f9">
      <div style="font-size:12px;font-weight:700;color:#475569;margin-bottom:10px">
        ${b.name ? `バナー ${esc(b.name)} — ` : ''}案件ID: ${esc(b.id)}
      </div>
      <div class="info-grid">
        <div class="info-row"><span class="key">掲載開始</span><span class="val">${esc(b.start)}</span></div>
        <div class="info-row"><span class="key">掲載終了</span><span class="val">${esc(b.end)}</span></div>
        <div class="info-row full"><span class="key">ファイル名</span><span class="val">${esc(b.images)}</span></div>
        <div class="info-row full"><span class="key">キャッチコピー</span><span class="val copy">${esc(b.copy)}</span></div>
        <div class="info-row full"><span class="key">誘導先URL</span><span class="val"><a href="${safeHref(b.url)}" style="color:#3b82f6">${esc(b.url)}</a></span></div>
      </div>
    </div>`).join('')}`;
}

// ── チェックリスト ────────────────────────────────────────────
function updateProgress(caseId) {
  const state   = loadState(caseId);
  const allKeys = CHECKLIST_GROUPS.flatMap(g => g.keys);
  const done    = allKeys.filter(k => state[k]).length;
  const pct     = Math.round(done / allKeys.length * 100);
  document.getElementById('clFill').style.width  = pct + '%';
  document.getElementById('clLabel').textContent = `${done} / ${allKeys.length} 完了 (${pct}%)`;
}

function renderChecklist() {
  const caseId = document.getElementById('clSelect').value;
  const wrap   = document.getElementById('checklistWrap');
  const hasCase = !!caseId;
  document.getElementById('clProgress').style.display = hasCase ? 'flex' : 'none';
  document.getElementById('resetBtn').style.display   = hasCase ? ''    : 'none';

  if (!hasCase) {
    wrap.innerHTML = '<div class="empty-state">案件を選択するとチェックリストが表示されます</div>';
    return;
  }

  const state = loadState(caseId);
  updateProgress(caseId);

  wrap.innerHTML = CHECKLIST_GROUPS.map(group => `
    <div class="checklist-group">
      <h3>${esc(group.label)}</h3>
      <div class="checklist-card">
        ${group.keys.map(key => `
          <label class="check-item">
            <input type="checkbox" ${state[key] ? 'checked' : ''}
              onchange="toggleCheck(this, ${caseId}, '${esc(key)}')">
            <span class="check-label">${esc(key)}</span>
          </label>`).join('')}
      </div>
    </div>`).join('');
}

function toggleCheck(cb, caseId, key) {
  const state = loadState(caseId);
  state[key]  = cb.checked;
  saveState(caseId, state);
  updateProgress(caseId);
}

function resetChecklist() {
  const caseId = parseInt(document.getElementById('clSelect').value);
  if (!caseId) return;
  if (!confirm('このチェックリストをリセットしますか？')) return;
  localStorage.removeItem(clKey(caseId));
  renderChecklist();
}

// ── ナビゲーション ────────────────────────────────────────────
const TITLES = { cases:'案件一覧', links:'共通リンク', info:'案件情報', checklist:'制作チェックリスト' };
function navigate(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  const view = el.dataset.view;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.getElementById('pageTitle').textContent  = TITLES[view];
  document.getElementById('middleNav').classList.toggle('open', view === 'links');
  document.getElementById('topbarMeta').textContent = view === 'cases' ? `全 ${CASES.length} 件` : '';
}

// ── マニュアルボタン ──────────────────────────────────────────
function buildManuals() {
  const c = document.getElementById('midItems');
  for (let i = 1; i <= 20; i++) {
    const a = document.createElement('a');
    a.className = 'manual-btn'; a.href = '#';
    a.innerHTML = `<span class="mi">📖</span>マニュアル${i}`;
    a.addEventListener('click', e => e.preventDefault());
    c.appendChild(a);
  }
}

// ── 初期化 ────────────────────────────────────────────────────
buildManuals();
populateSelect('caseSelect');
populateSelect('clSelect');
renderCases();
</script>
